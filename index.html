<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leichenschau-Rechnung – Lokale Version mit Google-Maps-Route</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --card: #ffffff;
      --line: #d9e0ea;
      --text: #1a2430;
      --muted: #5f6b7a;
      --accent: #2557c7;
      --accent-2: #1a3f8c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      font-size: 14px;
    }
    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 10px;
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 10px;
    }
    .panel, .preview-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(18,33,61,.05);
    }
    .panel {
      padding: 10px;
      position: sticky;
      top: 10px;
      align-self: start;
    }
    .preview-wrap {
      padding: 10px;
      overflow: auto;
    }
    h1, h2 { margin: 0 0 6px 0; }
    h1 { font-size: 21px; }
    h2 { font-size: 14px; margin-top: 10px; }
    label {
      display: block;
      font-weight: 700;
      margin: 5px 0 3px;
      font-size: 12px;
    }
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
      height: 36px;
    }
    textarea {
      height: auto;
      min-height: 56px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      align-items: end;
    }
    button, .button-link {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:hover, .button-link:hover { background: var(--accent-2); }
    .btn-secondary {
      background: #e9eefb;
      color: var(--accent-2);
    }
    .btn-secondary:hover { background: #dce6ff; }
    .btn-ghost {
      background: #f2f4f8;
      color: var(--text);
    }
    .btn-ghost:hover { background: #e7ebf3; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .radio-box {
      display: grid;
      gap: 4px;
      margin-top: 4px;
    }
    .radio-option {
      border: 1px solid #c7d4ea;
      border-radius: 8px;
      background: #f8fbff;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s ease, border-color .15s ease;
      min-height: 0;
    }
    .radio-option:hover {
      background: #eef5ff;
      border-color: #9eb7e5;
    }
    .radio-option input[type="radio"] {
      transform: scale(1.1);
      margin: 0;
    }
    .radio-option strong { font-weight: 700; }
    .highlight-102 {
      margin-top: 8px;
      border: 2px solid #9eb7e5;
      border-radius: 8px;
      background: #eef5ff;
      padding: 7px 9px;
    }
    .highlight-102 label {
      margin: 0;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    .sum-box {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fafcff;
    }
    .sum-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px dashed #dfe6f2;
    }
    .sum-line:last-child { border-bottom: 0; }
    .sum-total { font-size: 17px; font-weight: 700; }
    .status {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.35;
      min-height: 18px;
      color: var(--muted);
    }

    .invoice-sheet {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      color: #111;
      font-family: Calibri, Arial, Helvetica, sans-serif;
      font-size: 10.5pt;
      line-height: 1.15;
      padding: 20mm 18mm 20mm 25mm;
      border: 1px solid #e5eaf2;
      position: relative;
    }
    .sender-line {
      font-size: 8.5pt;
      margin-bottom: 8mm;
      text-decoration: underline;
      text-underline-offset: 1px;
    }
    .recipient-window {
      min-height: 40mm;
      margin-bottom: 20mm;
      padding-top: 3mm;
    }
    .recipient {
      white-space: pre-line;
      font-size: 10.5pt;
      line-height: 1.2;
    }
    .city-date {
      text-align: right !important;
      margin-bottom: 8mm;
      width: 100%;
      display: block;
    }
    .invoice-sheet h1 {
      font-size: 13pt;
      margin: 0 0 6mm 0;
      font-weight: 700;
    }
    .invoice-sheet p { margin: 0 0 2.1mm 0; }
    .meta { margin-bottom: 6mm; }
    .intro { margin-bottom: 5mm; }
    .invoice-sheet table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 5mm 0;
      table-layout: fixed;
    }
    .invoice-sheet th, .invoice-sheet td {
      padding: 1.8mm 1mm 1.8mm 0;
      vertical-align: top;
      font-size: 10.5pt;
    }
    .invoice-sheet th {
      font-weight: 700;
      text-align: left;
      border-bottom: 1px solid #000;
    }
    .invoice-sheet td:nth-child(2), .invoice-sheet th:nth-child(2) {
      width: 33mm;
      text-align: right;
      padding-right: 0;
    }
    .total { margin: 0 0 6mm 0; font-weight: 700; }
    .legal { margin-bottom: 6mm; }
    .closing { margin-top: 8mm; }
    .signature-space { height: 8mm; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; }
      .preview-wrap { padding: 8px; }
      .invoice-sheet {
        width: 100%;
        min-height: auto;
        padding: 12px;
      }
      .city-date { text-align: left !important; }
      .recipient-window { min-height: auto; margin-bottom: 12px; }
    }

    @media print {
      @page { size: A4; margin: 20mm 18mm 20mm 25mm; }
      body { background: #fff; }
      .app { display: block; padding: 0; max-width: none; }
      .panel { display: none !important; }
      .preview-wrap { border: 0; box-shadow: none; padding: 0; }
      .invoice-sheet {
        border: 0;
        margin: 0;
        width: auto;
        min-height: auto;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>Leichenschau-Rechnung</h1>

      <h2>Stammdaten</h2>
      <label for="provider">Leistungserbringer</label>
      <input id="provider" value="Christoph Heine" />

      <label for="senderLine">Absenderzeile</label>
      <input id="senderLine" value="Christoph Heine · Hermannstraße 40 · 15562 Rüdersdorf · heine@gzrd.de" />

      <label for="paymentInfo">Zahlungsinformationen</label>
      <textarea id="paymentInfo">Kontoinhaber: Christoph Heine
IBAN: DE42 1705 4040 1014 4064 51
BIC: WELADED1MOL
Bank: Sparkasse Märkisch-Oderland</textarea>

      <label for="recipient">Rechnungsempfänger</label>
      <textarea id="recipient">Ordnungsamt Strausberg
Hegermühlenstraße 58
15344 Strausberg</textarea>

      <h2>Rechnung</h2>
      <div class="row">
        <div>
          <label for="invoiceNumber">Rechnungsnummer</label>
          <input id="invoiceNumber" value="2026-003" />
        </div>
        <div>
          <label for="cityDate">Ort / Datum</label>
          <input id="cityDate" value="" readonly />
        </div>
      </div>

      <div class="row-3">
        <div>
          <label for="serviceDate">Leistungszeit – Datum</label>
          <input id="serviceDate" value="31.03.2026" />
        </div>
        <div>
          <label for="serviceTime">Leistungszeit – Uhrzeit</label>
          <input id="serviceTime" type="time" value="08:40" />
        </div>
        <div>
          <label for="distanceKm">Entfernung km</label>
          <input id="distanceKm" type="number" step="0.1" min="0" value="0" />
        </div>
      </div>

      <label for="serviceLocation">Leistungsort</label>
      <input id="serviceLocation" value="Dorfstraße 1, 16244 Plandorf" />

      <div class="actions">
        <button type="button" id="openMapsBtn">Route in Google Maps öffnen</button>
        <button type="button" class="btn-secondary" id="takeKmBtn">Kilometer übernehmen</button>
      </div>
      <div id="distanceStatus" class="status">Startpunkt ist fest: Sachtelebenstraße 6, 16321 Bernau.</div>

      <h2>Patient</h2>
      <div class="row">
        <div>
          <label for="patientName">Patient</label>
          <input id="patientName" value="Wolf, Hannelore" />
        </div>
        <div>
          <label for="birthDate">Geburtsdatum</label>
          <input id="birthDate" value="31.10.1944" />
        </div>
      </div>

      <h2>Grundleistung</h2>
      <div class="radio-box">
        <label class="radio-option">
          <input type="radio" name="baseService" value="100" />
          <span><strong>Nr. 100 GOÄ</strong> - Vorläufige Leichenschau (110,51 €)</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="baseService" value="101" checked />
          <span><strong>Nr. 101 GOÄ</strong> - Eingehende Leichenschau (165,77 €)</span>
        </label>
      </div>

      <div class="highlight-102">
        <label><input type="checkbox" id="include102" /> Nr. 102 GOÄ zusätzlich abrechnen</label>
      </div>

      <div class="sum-box">
        <div class="sum-line"><span>Zwischensumme</span><strong id="subtotalBox">0,00 €</strong></div>
        <div class="sum-line sum-total"><span>Gesamtbetrag</span><span id="totalBox">0,00 €</span></div>
      </div>

      <div class="actions">
        <button type="button" id="newNumberBtn">Neue Rechnungsnummer</button>
        <button type="button" class="btn-secondary" id="printBtn">Drucken / PDF</button>
        <button type="button" class="btn-ghost" id="copyHtmlBtn">Rechnungs-HTML kopieren</button>
      </div>
    </aside>

    <section class="preview-wrap">
      <div id="invoicePreview" class="invoice-sheet"></div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const fields = {
      provider: $("provider"),
      senderLine: $("senderLine"),
      paymentInfo: $("paymentInfo"),
      recipient: $("recipient"),
      invoiceNumber: $("invoiceNumber"),
      cityDate: $("cityDate"),
      serviceDate: $("serviceDate"),
      serviceTime: $("serviceTime"),
      distanceKm: $("distanceKm"),
      serviceLocation: $("serviceLocation"),
      patientName: $("patientName"),
      birthDate: $("birthDate"),
      include102: $("include102")
    };

    const labels = {
      subtotalBox: $("subtotalBox"),
      totalBox: $("totalBox"),
      distanceStatus: $("distanceStatus")
    };

    const prices = {
      goae102: 27.63,
      F: 15.15,
      G: 26.23,
      H: 19.82
    };

    const START_ADDRESS = "Sachtelebenstraße 6, 16321 Bernau";

    const preview = $("invoicePreview");

    function euro(value) {
      return Number(value || 0).toLocaleString("de-DE", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + " €";
    }

    function numberValue(input) {
      const n = parseFloat(String(input.value).replace(",", "."));
      return Number.isFinite(n) ? n : 0;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function nl2brEscaped(str) {
      return escapeHtml(str).replace(/\n/g, "<br>");
    }

    function formatGermanDate(date) {
      const dd = String(date.getDate()).padStart(2, "0");
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const yyyy = date.getFullYear();
      return `${dd}.${mm}.${yyyy}`;
    }

    function setCurrentCityDate() {
      const now = new Date();
      fields.cityDate.value = `Rüdersdorf, den ${formatGermanDate(now)}`;
    }

    function getBaseServiceValue() {
      const selected = document.querySelector('input[name="baseService"]:checked')?.value || "";
      if (selected === "100") return { label: "Nr. 100 GOÄ - Vorläufige Leichenschau", amount: 110.51 };
      if (selected === "101") return { label: "Nr. 101 GOÄ - Eingehende Leichenschau", amount: 165.77 };
      return null;
    }

    function getServiceDateObj() {
      const d = fields.serviceDate.value.trim();
      const t = fields.serviceTime.value.trim() || "00:00";
      const m = d.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
      if (!m) return null;
      return new Date(`${m[3]}-${m[2]}-${m[1]}T${t}:00`);
    }

    function easterSunday(year) {
      const a = year % 19, b = Math.floor(year/100), c = year % 100;
      const d = Math.floor(b/4), e = b % 4, f = Math.floor((b+8)/25), g = Math.floor((b-f+1)/3);
      const h = (19*a + b - d - g + 15) % 30, i = Math.floor(c/4), k = c % 4;
      const l = (32 + 2*e + 2*i - h - k) % 7, m = Math.floor((a + 11*h + 22*l)/451);
      const month = Math.floor((h + l - 7*m + 114) / 31);
      const day = ((h + l - 7*m + 114) % 31) + 1;
      return new Date(year, month - 1, day);
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function dateKey(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function brandenburgHolidays(year) {
      const easter = easterSunday(year);
      const fixed = [
        new Date(year,0,1),
        new Date(year,4,1),
        new Date(year,9,3),
        new Date(year,9,31),
        new Date(year,11,25),
        new Date(year,11,26)
      ];
      const movable = [
        addDays(easter, -2),
        addDays(easter, 1),
        addDays(easter, 39),
        addDays(easter, 50)
      ];
      return new Set([...fixed, ...movable].map(dateKey));
    }

    function isHolidayOrWeekend(dateObj) {
      if (!dateObj) return false;
      const day = dateObj.getDay();
      // JavaScript: 0 = Sonntag, 6 = Samstag
      if (day === 6 || day === 0) return true;
      return brandenburgHolidays(dateObj.getFullYear()).has(dateKey(dateObj));
    }

    function getTimeBand(dateObj) {
      if (!dateObj) return "none";
      const h = dateObj.getHours() + dateObj.getMinutes()/60;
      if (h >= 22 || h < 6) return "G";
      if ((h >= 20 && h < 22) || (h >= 6 && h < 8)) return "F";
      return "none";
    }

    function getTimeRangeText(dateObj) {
      const band = getTimeBand(dateObj);
      if (band === "G") return "22:00–06:00 Uhr";
      if (band === "F") {
        const h = dateObj ? dateObj.getHours() + dateObj.getMinutes()/60 : 0;
        return (h >= 20 && h < 22) ? "20:00–22:00 Uhr" : "06:00–08:00 Uhr";
      }
      return "";
    }

    function computeTravelAuto(distanceKm, timeBand) {
      if (!Number.isFinite(distanceKm) || distanceKm <= 0) {
        return { type: null, label: "", amount: 0 };
      }
      const night = timeBand === "F" || timeBand === "G";

      if (distanceKm <= 25) {
        let amount = 0;
        let bereich = "";
        if (distanceKm <= 2) {
          amount = night ? 7.16 : 3.58;
          bereich = "unter 2 km";
        } else if (distanceKm <= 5) {
          amount = night ? 10.23 : 6.65;
          bereich = "über 2 bis 5 km";
        } else if (distanceKm <= 10) {
          amount = night ? 15.34 : 10.23;
          bereich = "über 5 bis 10 km";
        } else {
          amount = night ? 25.56 : 15.34;
          bereich = "über 10 bis 25 km";
        }
        return {
          type: "8",
          label: `Wegegeld nach § 8 GOÄ - ${bereich}`,
          amount
        };
      }

      const roundTripKm = distanceKm * 2;
      const amount = (roundTripKm * 0.26) + 51.13;
      return {
        type: "9",
        label: "Reiseentschädigung nach § 9 GOÄ - über 25 km Entfernung",
        amount
      };
    }

    function openGoogleMapsRoute() {
      const destination = fields.serviceLocation.value.trim();
      if (!destination) {
        labels.distanceStatus.textContent = "Bitte zuerst einen Leistungsort eingeben.";
        return;
      }
      const url = "https://www.google.com/maps/dir/?api=1"
        + "&origin=" + encodeURIComponent(START_ADDRESS)
        + "&destination=" + encodeURIComponent(destination)
        + "&travelmode=driving";
      window.open(url, "_blank");
      labels.distanceStatus.textContent = "Google Maps wurde geöffnet. Bitte die Fahrstrecke ablesen und danach mit „Kilometer übernehmen“ eintragen.";
    }

    function takeKilometers() {
      const current = fields.distanceKm.value.trim();
      if (!current || Number(current) <= 0) {
        const entered = prompt("Bitte die in Google Maps angezeigte Fahrstrecke in km eingeben:", "");
        if (entered !== null && entered !== "") {
          const normalized = entered.replace(",", ".");
          const km = parseFloat(normalized);
          if (Number.isFinite(km) && km > 0) {
            fields.distanceKm.value = km.toFixed(1);
            labels.distanceStatus.textContent = `Fahrstrecke übernommen: ${km.toFixed(1)} km.`;
            renderPreview();
          } else {
            labels.distanceStatus.textContent = "Die eingegebene Fahrstrecke war nicht gültig.";
          }
        }
      } else {
        labels.distanceStatus.textContent = `Aktuell übernommen: ${Number(current).toLocaleString("de-DE", {minimumFractionDigits:1, maximumFractionDigits:1})} km.`;
        renderPreview();
      }
    }

    function createInvoiceRows() {
      const rows = [];
      const base = getBaseServiceValue();
      const dateObj = getServiceDateObj();
      const timeBand = getTimeBand(dateObj);
      const isH = isHolidayOrWeekend(dateObj);
      const timeRangeText = getTimeRangeText(dateObj);
      const travel = computeTravelAuto(numberValue(fields.distanceKm), timeBand);

      if (base) rows.push(base);
      if (fields.include102.checked) rows.push({ label: "Nr. 102 GOÄ - Zuschlag bei unbekannter Identität und besonderen Todesumständen", amount: prices.goae102 });
      if (timeBand === "F") rows.push({ label: `Zuschlag F - ${timeRangeText}`, amount: prices.F });
      if (timeBand === "G") rows.push({ label: `Zuschlag G - ${timeRangeText}`, amount: prices.G });
      if (isH) rows.push({ label: "Zuschlag H - Samstag, Sonntag oder Feiertag", amount: prices.H });
      if (travel.type) rows.push({ label: travel.label, amount: travel.amount });

      return rows;
    }

    function calculateTotal() {
      return createInvoiceRows().reduce((sum, row) => sum + row.amount, 0);
    }

    function renderPreview() {
      const rows = createInvoiceRows();
      const total = calculateTotal();
      labels.subtotalBox.textContent = euro(total);
      labels.totalBox.textContent = euro(total);

      const leistungszeit = `${escapeHtml(fields.serviceDate.value)} ${escapeHtml(fields.serviceTime.value)} Uhr`;

      const tableRows = rows.map(r => `
        <tr>
          <td>${escapeHtml(r.label)}</td>
          <td>${euro(r.amount)}</td>
        </tr>
      `).join("");

      preview.innerHTML = `
        <div class="sender-line">${escapeHtml(fields.senderLine.value)}</div>

        <div class="recipient-window">
          <div class="recipient">${escapeHtml(fields.recipient.value)}</div>
        </div>

        <div class="city-date">${escapeHtml(fields.cityDate.value)}</div>

        <h1>Rechnung</h1>

        <div class="meta">
          <p><strong>Rechnungsnummer:</strong> ${escapeHtml(fields.invoiceNumber.value)}</p>
          <p><strong>Leistungszeit:</strong> ${leistungszeit}</p>
          <p><strong>Leistungsort:</strong> ${escapeHtml(fields.serviceLocation.value)}</p>
          <p><strong>Patient:</strong> ${escapeHtml(fields.patientName.value)}, geb. ${escapeHtml(fields.birthDate.value)}</p>
        </div>

        <div class="intro">
          <p>Sehr geehrte Damen und Herren,</p>
          <p>ich erlaube mir, für die oben aufgeführten Leistungen Folgendes zu berechnen:</p>
        </div>

        <table>
          <thead><tr><th>Leistung</th><th>Betrag</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>

        <p class="total">Gesamtbetrag: ${euro(total)}</p>

        <div class="legal">
          <p>Die Abrechnung erfolgt gemäß GOÄ.</p>
          <p>Zahlbar innerhalb von 14 Tagen ohne Abzug.</p>
        </div>

        <div>${nl2brEscaped(fields.paymentInfo.value)}</div>

        <div class="closing">
          <p>Mit freundlichen Grüßen</p>
          <div class="signature-space"></div>
          <p>${escapeHtml(fields.provider.value)}</p>
        </div>
      `;
    }

    function generateInvoiceNumber() {
      const now = new Date();
      setCurrentCityDate();
      fields.invoiceNumber.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}-${String(now.getHours()).padStart(2, "0")}${String(now.getMinutes()).padStart(2, "0")}`;
      renderPreview();
    }

    function copyInvoiceHtml() {
      const doc = `<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Rechnung ${escapeHtml(fields.invoiceNumber.value)}</title>
  <style>
    @page { size: A4; margin: 20mm 18mm 20mm 25mm; }
    body{margin:0;font-family:Calibri,Arial,Helvetica,sans-serif;color:#111;font-size:10.5pt;line-height:1.15;background:#fff}
    .invoice-sheet{background:white}
    .sender-line{font-size:8.5pt;margin-bottom:8mm;text-decoration:underline;text-underline-offset:1px}
